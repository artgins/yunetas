name: Publish yunetas to npm

on:
  release:
    types: [published]

jobs:
  publish:
    # Only run if the release tag starts with "js-v" (e.g., js-v0.3.0)
    if: startsWith(github.event.release.tag_name, 'js-v')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kernel/js/yunetas-js7/yunetas

    permissions:
      contents: read
      id-token: write  # Required for npm provenance

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --run

      - name: Build
        run: npm run build

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#js-v}"
          npm version "$VERSION" --no-git-tag-version

      - name: Publish to npm
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
