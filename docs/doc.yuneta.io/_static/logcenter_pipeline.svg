<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 320" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" role="img" aria-label="logcenter ingest: a UDP datagram (priority, sequence, message, crc) arrives at C_GSS_UDP_S; logcenter verifies the CRC and sequence, strips the framing, then fans out — counts by priority, writes a disk-guarded rotatory file, and if the body is JSON folds it into a summary tree; the summary is e-mailed and can restart the node on a queue alarm.">
  <defs>
    <marker id="lc" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#5b6b7f"/>
    </marker>
  </defs>
  <!-- transparent background -->

  <!-- wire format -->
  <text x="194" y="28" text-anchor="middle" font-size="10" font-weight="700" fill="#5b6b7f">UDP datagram (to_udp handler)</text>
  <g font-size="9" fill="#33414f">
    <rect x="24" y="36" width="44" height="34" fill="#eef2f7" stroke="#5b6b7f"/><text x="46" y="57" text-anchor="middle">prio</text>
    <rect x="68" y="36" width="92" height="34" fill="#eef2f7" stroke="#5b6b7f"/><text x="114" y="57" text-anchor="middle">seq · 8 hex</text>
    <rect x="160" y="36" width="140" height="34" fill="#e8f0fe" stroke="#4a78c8"/><text x="230" y="57" text-anchor="middle" fill="#22386b">message bytes</text>
    <rect x="300" y="36" width="92" height="34" fill="#fde9d9" stroke="#d98a3d"/><text x="346" y="57" text-anchor="middle" fill="#7a4e18">crc · 8 hex</text>
  </g>

  <!-- udp server -->
  <g>
    <rect x="24" y="120" width="172" height="58" rx="9" fill="#eef2f7" stroke="#5b6b7f" stroke-width="1.5"/>
    <text x="110" y="143" text-anchor="middle" font-size="11" font-weight="700" fill="#33414f">C_GSS_UDP_S</text>
    <text x="110" y="160" text-anchor="middle" font-size="9.5" fill="#8593a3">udp://127.0.0.1:1992</text>
  </g>
  <!-- verify -->
  <g>
    <rect x="226" y="120" width="180" height="58" rx="9" fill="#fff4e0" stroke="#d98a3d" stroke-width="1.5"/>
    <text x="316" y="143" text-anchor="middle" font-size="11" font-weight="700" fill="#7a4e18">verify CRC + seq</text>
    <text x="316" y="160" text-anchor="middle" font-size="9.5" fill="#b08442">strip framing</text>
  </g>

  <!-- fan-out -->
  <g>
    <rect x="470" y="40" width="256" height="52" rx="9" fill="#e8f0fe" stroke="#4a78c8" stroke-width="1.4"/>
    <text x="598" y="60" text-anchor="middle" font-size="10.5" font-weight="700" fill="#22386b">count by priority</text>
    <text x="598" y="78" text-anchor="middle" font-size="8.5" fill="#5b78b0">Alert·Crit·Err·Warn·Info·Debug·Audit·Monitor</text>

    <rect x="470" y="124" width="256" height="52" rx="9" fill="#e8f0fe" stroke="#4a78c8" stroke-width="1.4"/>
    <text x="598" y="144" text-anchor="middle" font-size="10.5" font-weight="700" fill="#22386b">write rotatory file</text>
    <text x="598" y="162" text-anchor="middle" font-size="8.5" fill="#5b78b0">disk-guarded · pauses below min_free_disk</text>

    <rect x="470" y="208" width="256" height="52" rx="9" fill="#e6f4ea" stroke="#2a9d8f" stroke-width="1.4"/>
    <text x="598" y="228" text-anchor="middle" font-size="10.5" font-weight="700" fill="#1d6b60">if JSON → fold into summary tree</text>
    <text x="598" y="246" text-anchor="middle" font-size="8.5" fill="#3f9588">msgset → msg → count</text>
  </g>

  <!-- output -->
  <g>
    <rect x="762" y="180" width="160" height="80" rx="9" fill="#fff4e0" stroke="#d98a3d" stroke-width="1.5"/>
    <text x="842" y="206" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7a4e18">summary report</text>
    <text x="842" y="224" text-anchor="middle" font-size="9" fill="#b08442">e-mail (emailsender)</text>
    <text x="842" y="240" text-anchor="middle" font-size="9" fill="#b08442">restart on queue alarm</text>
  </g>

  <!-- arrows -->
  <line x1="110" y1="70" x2="110" y2="120" stroke="#5b6b7f" stroke-width="1.8" marker-end="url(#lc)"/>
  <line x1="196" y1="149" x2="226" y2="149" stroke="#5b6b7f" stroke-width="1.8" marker-end="url(#lc)"/>
  <path d="M406,140 C440,120 450,90 470,72" fill="none" stroke="#5b6b7f" stroke-width="1.7" marker-end="url(#lc)"/>
  <line x1="406" y1="149" x2="470" y2="149" stroke="#5b6b7f" stroke-width="1.7" marker-end="url(#lc)"/>
  <path d="M406,158 C440,180 450,210 470,228" fill="none" stroke="#5b6b7f" stroke-width="1.7" marker-end="url(#lc)"/>
  <line x1="726" y1="234" x2="762" y2="222" stroke="#2a9d8f" stroke-width="1.8" marker-end="url(#lc)"/>

  <text x="420" y="300" text-anchor="middle" font-size="10" fill="#8593a3">One datagram fans out three ways; only JSON bodies reach the summary tree. logcenter uses raw timeranger2, not treedb.</text>
</svg>
