<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 380" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" role="img" aria-label="Three-layer certificate defense in depth. Layer 1 deploy hook (immediate) and Layer 2 agent auto-sync (within 15 minutes) both trigger reload-certs which calls ytls_reload_certificates. Layer 3 expiry monitor independently logs warnings or critical alerts. Each layer covers the one above failing.">
  <defs>
    <marker id="cd" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2a9d8f"/>
    </marker>
    <marker id="cdA" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#d98a3d"/>
    </marker>
  </defs>
  <!-- transparent background -->

  <text x="190" y="34" text-anchor="middle" font-size="12" font-weight="700" fill="#5b6b7f">three independent layers</text>

  <!-- Layer 1 -->
  <g>
    <rect x="30" y="52" width="340" height="70" rx="9" fill="#e6f4ea" stroke="#2a9d8f" stroke-width="1.5"/>
    <text x="46" y="74" font-size="11.5" font-weight="700" fill="#1d6b60">Layer 1 · Deploy hook (fast path)</text>
    <text x="46" y="93" font-size="10" fill="#41504f">certbot success → copies certs → reload-certs on every yuno</text>
    <text x="46" y="111" font-size="10" font-weight="600" fill="#3f9588">latency: immediate</text>
  </g>
  <!-- Layer 2 -->
  <g>
    <rect x="30" y="142" width="340" height="70" rx="9" fill="#e6f4ea" stroke="#2a9d8f" stroke-width="1.5"/>
    <text x="46" y="164" font-size="11.5" font-weight="700" fill="#1d6b60">Layer 2 · Agent auto-sync (self-healing)</text>
    <text x="46" y="183" font-size="10" fill="#41504f">c_agent timer detects cert change → broadcasts reload-certs</text>
    <text x="46" y="201" font-size="10" font-weight="600" fill="#3f9588">latency: ≤ 15 min — covers Layer 1 failing</text>
  </g>
  <!-- Layer 3 -->
  <g>
    <rect x="30" y="232" width="340" height="70" rx="9" fill="#fff4e0" stroke="#d98a3d" stroke-width="1.5"/>
    <text x="46" y="254" font-size="11.5" font-weight="700" fill="#7a4e18">Layer 3 · Expiry monitor (alerting)</text>
    <text x="46" y="273" font-size="10" fill="#41504f">c_yuno timer reads not_after of every TLS listener</text>
    <text x="46" y="291" font-size="10" font-weight="600" fill="#b08442">logs warning / critical — covers both failing</text>
  </g>

  <!-- reload entry point -->
  <g>
    <rect x="520" y="96" width="296" height="84" rx="10" fill="#3b4a5e"/>
    <text x="668" y="124" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">reload-certs</text>
    <text x="668" y="146" text-anchor="middle" font-size="10.5" fill="#cdd6e1">→ ytls_reload_certificates()</text>
    <text x="668" y="166" text-anchor="middle" font-size="9.5" fill="#9aa7b6">hot-swaps the cert, no dropped sessions</text>
  </g>

  <!-- alert outcome -->
  <g>
    <rect x="520" y="240" width="296" height="56" rx="9" fill="#fff4e0" stroke="#d98a3d" stroke-width="1.4" stroke-dasharray="4 3"/>
    <text x="668" y="262" text-anchor="middle" font-size="11" font-weight="700" fill="#7a4e18">log warning / critical</text>
    <text x="668" y="280" text-anchor="middle" font-size="9.5" fill="#b08442">does not reload — it makes the failure loud</text>
  </g>

  <!-- arrows -->
  <path d="M370,87 C440,96 470,120 520,128" fill="none" stroke="#2a9d8f" stroke-width="1.8" marker-end="url(#cd)"/>
  <path d="M370,177 C440,168 470,150 520,142" fill="none" stroke="#2a9d8f" stroke-width="1.8" marker-end="url(#cd)"/>
  <line x1="370" y1="267" x2="520" y2="267" stroke="#d98a3d" stroke-width="1.8" stroke-dasharray="4 3" marker-end="url(#cdA)"/>

  <text x="420" y="344" text-anchor="middle" font-size="10.5" fill="#8593a3">No single layer is required for the others — the renewal path self-heals, and the monitor catches the case where it doesn't.</text>
</svg>
