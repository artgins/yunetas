<!-- Reduce inter-page navigation flash.
     Loaded via `include-in-header` in _quarto.yml so it lands in <head>
     on every rendered page. -->

<!-- 1. Chromium Speculation Rules API (Chrome/Edge 121+).
     Tells the browser to prerender same-origin links on hover, so by
     the time the user clicks the destination is already parsed and
     rendered → near-instant navigation, no white flash. Browsers that
     don't support the API simply ignore this <script> block. -->
<script type="speculationrules">
{
  "prerender": [
    {
      "where": { "href_matches": "/*" },
      "eagerness": "moderate"
    }
  ]
}
</script>

<!-- 2. Fallback for Firefox/Safari: prefetch same-origin links when
     the user hovers over them for a few milliseconds. Much lighter
     than prerender (just downloads the HTML, doesn't render it) but
     still makes navigation feel noticeably snappier. -->
<script>
(function () {
  if (!('IntersectionObserver' in window)) return;
  const prefetched = new Set();
  function prefetch(url) {
    if (prefetched.has(url)) return;
    prefetched.add(url);
    const link = document.createElement('link');
    link.rel = 'prefetch';
    link.href = url;
    document.head.appendChild(link);
  }
  document.addEventListener('mouseover', function (e) {
    const a = e.target.closest('a[href]');
    if (!a) return;
    const href = a.href;
    if (!href || a.hostname !== location.hostname) return;
    // Skip anchors on the current page and downloadable assets.
    if (href.indexOf('#') >= 0 && href.split('#')[0] === location.href.split('#')[0]) return;
    if (a.hasAttribute('download')) return;
    prefetch(href);
  }, { passive: true });
})();
</script>
