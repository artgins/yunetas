  template: book-theme
  options:
    logo: _static/yuneta-label.svg
    logo_dark: _static/yuneta-label.svg
    favicon: _static/yuneta-y.svg
    hide_toc: false
    hide_search_button: false
  parts:
    navbar_end: _static/navbar_end.md
