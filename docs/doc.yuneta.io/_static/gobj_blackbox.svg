<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 360" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" role="img" aria-label="A gobj is a black box exposing one typed interface with four facets: events (messages in and out, the FSM channel), commands (control-plane verbs), attributes (typed config and state), and statistics (live counters and metrics). The same four-facet contract holds for every gobj, in C and in JavaScript; gobjs talk to each other only through events.">
  <title>A gobj: a black box with a four-facet interface</title>

  <text x="380" y="28" text-anchor="middle" font-size="13" font-weight="700" fill="#41504f">A <tspan font-style="italic">gobj</tspan> is a black box — its only interface is four typed facets</text>

  <!-- frame -->
  <rect x="16" y="42" width="728" height="300" rx="12" fill="#fbfcfd" stroke="#d8dee6"/>

  <!-- connectors (drawn first, tucked under the cards / box) -->
  <g fill="none" stroke-width="2.2" stroke-linecap="round">
    <path d="M192,136 L300,172" stroke="#2a9d8f"/>
    <path d="M192,232 L300,216" stroke="#4a78c8"/>
    <path d="M568,136 L460,172" stroke="#d98a3d"/>
    <path d="M568,232 L460,216" stroke="#c0492f"/>
  </g>

  <!-- the black box -->
  <rect x="300" y="146" width="160" height="96" rx="12" fill="#2b3947" stroke="#1c2733"/>
  <text x="380" y="190" text-anchor="middle" font-size="25" font-weight="800" fill="#ffffff">gobj</text>
  <text x="380" y="212" text-anchor="middle" font-size="10" fill="#9fb0c2">finite-state object</text>
  <text x="380" y="229" text-anchor="middle" font-size="8.5" fill="#7f93a8">state × event → action</text>

  <!-- ports on the box edge, coloured per facet -->
  <g stroke="#ffffff" stroke-width="1">
    <rect x="295" y="167" width="10" height="10" rx="2.5" fill="#2a9d8f"/>
    <rect x="295" y="211" width="10" height="10" rx="2.5" fill="#4a78c8"/>
    <rect x="455" y="167" width="10" height="10" rx="2.5" fill="#d98a3d"/>
    <rect x="455" y="211" width="10" height="10" rx="2.5" fill="#c0492f"/>
  </g>

  <!-- facet: EVENTS (teal, top-left) -->
  <rect x="34" y="108" width="158" height="56" rx="9" fill="#e6f4ea" stroke="#2a9d8f"/>
  <text x="113" y="133" text-anchor="middle" font-size="13" font-weight="700" fill="#1d6b60">EVENTS</text>
  <text x="113" y="150" text-anchor="middle" font-size="9.5" fill="#3f9588">messages in ⇄ out</text>

  <!-- facet: ATTRIBUTES (blue, bottom-left) -->
  <rect x="34" y="204" width="158" height="56" rx="9" fill="#e8f0fe" stroke="#4a78c8"/>
  <text x="113" y="229" text-anchor="middle" font-size="13" font-weight="700" fill="#22386b">ATTRIBUTES</text>
  <text x="113" y="246" text-anchor="middle" font-size="9.5" fill="#5b78b0">typed config + state</text>

  <!-- facet: COMMANDS (orange, top-right) -->
  <rect x="568" y="108" width="158" height="56" rx="9" fill="#fff4e0" stroke="#d98a3d"/>
  <text x="647" y="133" text-anchor="middle" font-size="13" font-weight="700" fill="#7a4e18">COMMANDS</text>
  <text x="647" y="150" text-anchor="middle" font-size="9.5" fill="#b08442">control-plane verbs</text>

  <!-- facet: STATISTICS (red, bottom-right) -->
  <rect x="568" y="204" width="158" height="56" rx="9" fill="#fcebe7" stroke="#c0492f"/>
  <text x="647" y="229" text-anchor="middle" font-size="13" font-weight="700" fill="#9a3a25">STATISTICS</text>
  <text x="647" y="246" text-anchor="middle" font-size="9.5" fill="#b56a55">live counters &amp; metrics</text>

  <text x="380" y="312" text-anchor="middle" font-size="10.5" fill="#5b6b7f">Every component in Yuneta — in C and in JavaScript — is a <tspan font-style="italic" fill="#41504f">gobj</tspan> with this same contract.</text>
  <text x="380" y="330" text-anchor="middle" font-size="10" fill="#8593a3">You never reach inside. You send it events, invoke its commands, read/write its attributes, sample its statistics.</text>
</svg>
