<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 380" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" role="img" aria-label="Deploy/sync cycle: build, then diff against list-binaries, then classify each role as NEW, BUMP, REBUILD or UP-TO-DATE. For REBUILD roles the hot-patch runs per role in ascending start_priority: kill-yuno (SIGQUIT, poll until exit), update-binary, run-yuno play=0, play-yuno. Config push always succeeds on a running yuno; a version bump is a separate, non-automated path.">
  <defs>
    <marker id="ds" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#5b6b7f"/>
    </marker>
    <marker id="dsB" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#4a78c8"/>
    </marker>
  </defs>
  <!-- transparent background -->

  <!-- top row -->
  <g>
    <rect x="24" y="48" width="120" height="54" rx="8" fill="#eef2f7" stroke="#5b6b7f" stroke-width="1.4"/>
    <text x="84" y="80" text-anchor="middle" font-size="12" font-weight="700" fill="#33414f">build</text>
    <rect x="172" y="48" width="156" height="54" rx="8" fill="#eef2f7" stroke="#5b6b7f" stroke-width="1.4"/>
    <text x="250" y="73" text-anchor="middle" font-size="11" font-weight="700" fill="#33414f">diff</text>
    <text x="250" y="90" text-anchor="middle" font-size="9.5" fill="#8593a3">*list-binaries</text>
    <rect x="356" y="48" width="214" height="54" rx="8" fill="#e8f0fe" stroke="#4a78c8" stroke-width="1.5"/>
    <text x="463" y="71" text-anchor="middle" font-size="11" font-weight="700" fill="#22386b">classify each role</text>
    <text x="463" y="89" text-anchor="middle" font-size="9.5" fill="#5b78b0">NEW · BUMP · REBUILD · UP-TO-DATE</text>
  </g>
  <line x1="144" y1="75" x2="172" y2="75" stroke="#5b6b7f" stroke-width="1.8" marker-end="url(#ds)"/>
  <line x1="328" y1="75" x2="356" y2="75" stroke="#5b6b7f" stroke-width="1.8" marker-end="url(#ds)"/>

  <!-- REBUILD down -->
  <path d="M463,102 L463,128 L300,128 L300,160" fill="none" stroke="#4a78c8" stroke-width="1.8" marker-end="url(#dsB)"/>
  <text x="380" y="122" text-anchor="middle" font-size="9.5" font-weight="700" fill="#22386b">REBUILD →</text>
  <text x="612" y="75" font-size="9.5" fill="#8593a3">UP-TO-DATE → skip</text>

  <!-- REBUILD cycle group -->
  <rect x="24" y="160" width="742" height="138" rx="10" fill="#f1f6fc" stroke="#cdddf2"/>
  <text x="40" y="180" font-size="11" font-weight="700" fill="#22386b">REBUILD hot-patch — scoped by yuno_role, restarts in ascending start_priority</text>

  <g>
    <rect x="44" y="196" width="160" height="62" rx="8" fill="#fff4e0" stroke="#d98a3d" stroke-width="1.5"/>
    <text x="124" y="218" text-anchor="middle" font-size="11" font-weight="700" fill="#7a4e18">kill-yuno</text>
    <text x="124" y="235" text-anchor="middle" font-size="9.5" fill="#b08442">SIGQUIT (orderly)</text>
    <text x="124" y="250" text-anchor="middle" font-size="9.5" fill="#b08442">poll until it exits</text>

    <rect x="232" y="196" width="156" height="62" rx="8" fill="#eef2f7" stroke="#5b6b7f" stroke-width="1.4"/>
    <text x="310" y="222" text-anchor="middle" font-size="11" font-weight="700" fill="#33414f">update-binary</text>
    <text x="310" y="240" text-anchor="middle" font-size="9.5" fill="#8593a3">content64=$$(role)</text>

    <rect x="416" y="196" width="156" height="62" rx="8" fill="#eef2f7" stroke="#5b6b7f" stroke-width="1.4"/>
    <text x="494" y="222" text-anchor="middle" font-size="11" font-weight="700" fill="#33414f">run-yuno play=0</text>
    <text x="494" y="240" text-anchor="middle" font-size="9.5" fill="#8593a3">if it was running</text>

    <rect x="600" y="196" width="146" height="62" rx="8" fill="#e6f4ea" stroke="#2a9d8f" stroke-width="1.5"/>
    <text x="673" y="222" text-anchor="middle" font-size="11" font-weight="700" fill="#1d6b60">play-yuno</text>
    <text x="673" y="240" text-anchor="middle" font-size="9.5" fill="#3f9588">if it had been playing</text>
  </g>
  <line x1="204" y1="227" x2="232" y2="227" stroke="#5b6b7f" stroke-width="1.8" marker-end="url(#ds)"/>
  <line x1="388" y1="227" x2="416" y2="227" stroke="#5b6b7f" stroke-width="1.8" marker-end="url(#ds)"/>
  <line x1="572" y1="227" x2="600" y2="227" stroke="#5b6b7f" stroke-width="1.8" marker-end="url(#ds)"/>
  <text x="124" y="276" text-anchor="middle" font-size="9" fill="#b56a55">kill first — the binary is mapped (text-file-busy)</text>

  <!-- side notes -->
  <g>
    <rect x="784" y="48" width="184" height="100" rx="9" fill="#f6f7f9" stroke="#d8dee6"/>
    <text x="796" y="68" font-size="10.5" font-weight="700" fill="#41504f">configs (sync_configs)</text>
    <text x="796" y="86" font-size="9.5" fill="#5b6b7f">push always succeeds on a</text>
    <text x="796" y="100" font-size="9.5" fill="#5b6b7f">running yuno; restart is opt-in</text>
    <text x="796" y="118" font-size="9.5" fill="#5b6b7f">(--restart = same cycle,</text>
    <text x="796" y="132" font-size="9.5" fill="#5b6b7f">scoped by id, never node-wide)</text>
  </g>
  <g>
    <rect x="784" y="160" width="184" height="138" rx="9" fill="#fdecea" stroke="#e3b9b0"/>
    <text x="796" y="180" font-size="10.5" font-weight="700" fill="#9a3a25">version bump (separate)</text>
    <text x="796" y="200" font-size="9.5" fill="#b56a55">not automated:</text>
    <text x="796" y="217" font-size="9.5" fill="#b56a55">install-binary</text>
    <text x="796" y="234" font-size="9.5" fill="#b56a55">find-new-yunos create=1</text>
    <text x="796" y="251" font-size="9.5" fill="#b56a55">deactivate-snap</text>
    <text x="796" y="274" font-size="9" fill="#c98a7d">(re-run set_start_priorities</text>
    <text x="796" y="287" font-size="9" fill="#c98a7d">after — placement resets)</text>
  </g>

  <text x="400" y="330" text-anchor="middle" font-size="10.5" fill="#8593a3">Prior run/play state is read from *list-yunos and restored per role, so a deliberately stopped or paused yuno is left as it was.</text>
</svg>
