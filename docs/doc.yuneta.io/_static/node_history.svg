<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 392" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" role="img" aria-label="A treedb node is its append history: each create, update, link and unlink appends a record; the current node is the projection of the highest rowid; a link or unlink is an event in the history.">
  <defs>
    <marker id="hx" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#8593a3"/>
    </marker>
    <marker id="hxGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2a9d8f"/>
    </marker>
  </defs>

  <!-- transparent background -->

  <!-- title -->
  <text x="430" y="34" text-anchor="middle" font-size="13" font-weight="600" fill="#41504f">topic: <tspan font-weight="700">users</tspan> &#183; node <tspan font-weight="700">id = "ana"</tspan> &#8212; the node IS its append history</text>

  <!-- bracket: node^n -->
  <path d="M30,86 L30,76 L808,76 L808,86" fill="none" stroke="#9aa7b6" stroke-width="1.4"/>
  <rect x="372" y="58" width="94" height="22" rx="6" fill="#eef2f7" stroke="#9aa7b6"/>
  <text x="419" y="73" text-anchor="middle" font-size="12" font-weight="700" fill="#33414f">node &#8319;</text>

  <!-- ===== append records (rowid timeline) ===== -->
  <!-- r1 create -->
  <g>
    <rect x="30" y="118" width="130" height="86" rx="8" fill="#eef2f7" stroke="#5b6b7f" stroke-width="1.4"/>
    <rect x="30" y="118" width="130" height="24" rx="8" fill="#5b6b7f"/><rect x="30" y="130" width="130" height="12" fill="#5b6b7f"/>
    <text x="42" y="135" font-size="11.5" font-weight="700" fill="#fff">create</text>
    <text x="148" y="135" text-anchor="end" font-size="10.5" fill="#cdd6e1">g=1</text>
    <text x="95" y="166" text-anchor="middle" font-size="11" fill="#41504f">id: "ana"</text>
    <text x="95" y="186" text-anchor="middle" font-size="10" fill="#8593a3">first record</text>
  </g>
  <!-- r2 update -->
  <g>
    <rect x="192" y="118" width="130" height="86" rx="8" fill="#eef2f7" stroke="#5b6b7f" stroke-width="1.4"/>
    <rect x="192" y="118" width="130" height="24" rx="8" fill="#5b6b7f"/><rect x="192" y="130" width="130" height="12" fill="#5b6b7f"/>
    <text x="204" y="135" font-size="11.5" font-weight="700" fill="#fff">update</text>
    <text x="310" y="135" text-anchor="end" font-size="10.5" fill="#cdd6e1">g=2</text>
    <text x="257" y="166" text-anchor="middle" font-size="11" fill="#41504f">name: "Ana"</text>
    <text x="257" y="186" text-anchor="middle" font-size="10" fill="#8593a3">new row</text>
  </g>
  <!-- r3 link (relationship event) -->
  <g>
    <rect x="354" y="118" width="130" height="86" rx="8" fill="#fde9d9" stroke="#d98a3d" stroke-width="1.4"/>
    <rect x="354" y="118" width="130" height="24" rx="8" fill="#d98a3d"/><rect x="354" y="130" width="130" height="12" fill="#d98a3d"/>
    <text x="366" y="135" font-size="11.5" font-weight="700" fill="#fff">link</text>
    <text x="472" y="135" text-anchor="end" font-size="10.5" fill="#fbe3cf">g=3</text>
    <text x="419" y="166" text-anchor="middle" font-size="11" fill="#7a3e0e">fkey &#8594; "sales"</text>
    <text x="419" y="186" text-anchor="middle" font-size="10" fill="#b07a45">a relation = a row</text>
  </g>
  <!-- r4 unlink (relationship event) -->
  <g>
    <rect x="516" y="118" width="130" height="86" rx="8" fill="#fde9d9" stroke="#d98a3d" stroke-width="1.4"/>
    <rect x="516" y="118" width="130" height="24" rx="8" fill="#d98a3d"/><rect x="516" y="130" width="130" height="12" fill="#d98a3d"/>
    <text x="528" y="135" font-size="11.5" font-weight="700" fill="#fff">unlink</text>
    <text x="634" y="135" text-anchor="end" font-size="10.5" fill="#fbe3cf">g=4</text>
    <text x="581" y="166" text-anchor="middle" font-size="11" fill="#7a3e0e">fkey cleared</text>
    <text x="581" y="186" text-anchor="middle" font-size="10" fill="#b07a45">also a row</text>
  </g>
  <!-- r5 update (current) -->
  <g>
    <rect x="678" y="118" width="130" height="86" rx="8" fill="#e6f4ea" stroke="#2a9d8f" stroke-width="2"/>
    <rect x="678" y="118" width="130" height="24" rx="8" fill="#2a9d8f"/><rect x="678" y="130" width="130" height="12" fill="#2a9d8f"/>
    <text x="690" y="135" font-size="11.5" font-weight="700" fill="#fff">update</text>
    <text x="796" y="135" text-anchor="end" font-size="10.5" fill="#d3efe6">g=5</text>
    <text x="743" y="166" text-anchor="middle" font-size="11" fill="#1d6b60">name: "Ana B."</text>
    <text x="743" y="186" text-anchor="middle" font-size="10" fill="#3f9588">highest rowid</text>
  </g>

  <!-- append arrows -->
  <line x1="160" y1="161" x2="192" y2="161" stroke="#8593a3" stroke-width="1.6" marker-end="url(#hx)"/>
  <line x1="322" y1="161" x2="354" y2="161" stroke="#8593a3" stroke-width="1.6" marker-end="url(#hx)"/>
  <line x1="484" y1="161" x2="516" y2="161" stroke="#8593a3" stroke-width="1.6" marker-end="url(#hx)"/>
  <line x1="646" y1="161" x2="678" y2="161" stroke="#8593a3" stroke-width="1.6" marker-end="url(#hx)"/>
  <text x="419" y="108" text-anchor="middle" font-size="10" fill="#9aa7b6">append-only &#8594;  (every op writes a new row, g_rowid++)</text>

  <!-- current pointer -->
  <path d="M743,236 L743,206" fill="none" stroke="#2a9d8f" stroke-width="1.8" marker-end="url(#hxGreen)"/>
  <rect x="648" y="236" width="190" height="24" rx="6" fill="#e6f4ea" stroke="#2a9d8f"/>
  <text x="743" y="252" text-anchor="middle" font-size="10.5" font-weight="600" fill="#1d6b60">current = projection of highest rowid</text>

  <!-- note box -->
  <rect x="30" y="284" width="616" height="92" rx="8" fill="#f6f7f9" stroke="#d8dee6"/>
  <text x="46" y="306" font-size="11.5" font-weight="700" fill="#41504f">The unit is (node&#8319;) + link — and a link is an event of that history.</text>
  <text x="46" y="328" font-size="11" fill="#5b6b7f">A link / unlink appends a row that saves the <tspan font-weight="600">child</tspan> — it is not an in-place mutation.</text>
  <text x="46" y="348" font-size="11" fill="#5b6b7f">Delete must tombstone <tspan font-weight="600">every</tspan> row of the id (per-instance delete, 7.5.1), not just the latest;</text>
  <text x="46" y="366" font-size="11" fill="#5b6b7f">the loader re-elects the highest <tspan font-weight="600">surviving</tspan> rowid. Same lens fixed the version-aware unlink.</text>
</svg>
