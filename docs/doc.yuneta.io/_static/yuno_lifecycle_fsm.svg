<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 400" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" role="img" aria-label="Yuno lifecycle state machine: create-yuno to STOPPED, run-yuno to STARTING, EV_ON_OPEN to RUNNING paused, play-yuno and pause-yuno toggle paused and playing, kill-yuno returns to STOPPED, delete-yuno to DELETED.">
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#5b6b7f"/>
    </marker>
    <marker id="arGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2a9d8f"/>
    </marker>
    <marker id="arRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#c0492f"/>
    </marker>
  </defs>

  <!-- transparent background: adopts the page (neutral theme) -->

  <!-- entry -->
  <text x="105" y="44" text-anchor="middle" font-size="11.5" font-weight="600" fill="#5b6b7f">create-yuno</text>
  <text x="105" y="58" text-anchor="middle" font-size="10" fill="#8593a3">(register, stopped)</text>
  <line x1="105" y1="62" x2="105" y2="80" stroke="#5b6b7f" stroke-width="1.8" marker-end="url(#ar)"/>

  <!-- ===== states ===== -->
  <!-- STOPPED -->
  <g>
    <rect x="30" y="80" width="150" height="72" rx="9" fill="#eef2f7" stroke="#5b6b7f" stroke-width="1.5"/>
    <rect x="30" y="80" width="150" height="26" rx="9" fill="#5b6b7f"/><rect x="30" y="95" width="150" height="11" fill="#5b6b7f"/>
    <text x="105" y="98" text-anchor="middle" font-size="12.5" font-weight="700" fill="#fff">STOPPED</text>
    <text x="105" y="128" text-anchor="middle" font-size="11" fill="#41504f">running = false</text>
    <text x="105" y="144" text-anchor="middle" font-size="10.5" fill="#8593a3">registered, no pid</text>
  </g>
  <!-- STARTING -->
  <g>
    <rect x="240" y="80" width="150" height="72" rx="9" fill="#fff4e0" stroke="#d98a3d" stroke-width="1.5"/>
    <rect x="240" y="80" width="150" height="26" rx="9" fill="#d98a3d"/><rect x="240" y="95" width="150" height="11" fill="#d98a3d"/>
    <text x="315" y="98" text-anchor="middle" font-size="12.5" font-weight="700" fill="#fff">STARTING</text>
    <text x="315" y="128" text-anchor="middle" font-size="11" fill="#7a4e18">pid alive</text>
    <text x="315" y="144" text-anchor="middle" font-size="10.5" fill="#b08442">no channel yet</text>
  </g>
  <!-- RUNNING paused -->
  <g>
    <rect x="450" y="80" width="150" height="72" rx="9" fill="#e8f0fe" stroke="#4a78c8" stroke-width="1.5"/>
    <rect x="450" y="80" width="150" height="26" rx="9" fill="#4a78c8"/><rect x="450" y="95" width="150" height="11" fill="#4a78c8"/>
    <text x="525" y="98" text-anchor="middle" font-size="12.5" font-weight="700" fill="#fff">RUNNING · paused</text>
    <text x="525" y="128" text-anchor="middle" font-size="11" fill="#22386b">playing = false</text>
    <text x="525" y="144" text-anchor="middle" font-size="10.5" fill="#5b78b0">process up, no services</text>
  </g>
  <!-- RUNNING playing -->
  <g>
    <rect x="665" y="80" width="150" height="72" rx="9" fill="#e6f4ea" stroke="#2a9d8f" stroke-width="1.5"/>
    <rect x="665" y="80" width="150" height="26" rx="9" fill="#2a9d8f"/><rect x="665" y="95" width="150" height="11" fill="#2a9d8f"/>
    <text x="740" y="98" text-anchor="middle" font-size="12.5" font-weight="700" fill="#fff">RUNNING · playing</text>
    <text x="740" y="128" text-anchor="middle" font-size="11" fill="#1d6b60">playing = true</text>
    <text x="740" y="144" text-anchor="middle" font-size="10.5" fill="#3f9588">services active (mt_play)</text>
  </g>
  <!-- DELETED -->
  <g>
    <rect x="30" y="300" width="150" height="62" rx="9" fill="#fdecea" stroke="#c0492f" stroke-width="1.5"/>
    <rect x="30" y="300" width="150" height="24" rx="9" fill="#c0492f"/><rect x="30" y="313" width="150" height="11" fill="#c0492f"/>
    <text x="105" y="317" text-anchor="middle" font-size="12.5" font-weight="700" fill="#fff">DELETED</text>
    <text x="105" y="346" text-anchor="middle" font-size="10.5" fill="#9a3a25">treedb instance pruned</text>
  </g>

  <!-- ===== transitions ===== -->
  <!-- run-yuno -->
  <line x1="180" y1="116" x2="240" y2="116" stroke="#5b6b7f" stroke-width="1.8" marker-end="url(#ar)"/>
  <text x="210" y="108" text-anchor="middle" font-size="10" font-weight="600" fill="#41504f">run-yuno</text>
  <!-- EV_ON_OPEN (label lifted above the boxes so it clears the narrow gap) -->
  <line x1="390" y1="116" x2="450" y2="116" stroke="#5b6b7f" stroke-width="1.8" marker-end="url(#ar)"/>
  <text x="420" y="71" text-anchor="middle" font-size="10" font-weight="600" fill="#41504f">EV_ON_OPEN</text>
  <line x1="420" y1="76" x2="420" y2="110" stroke="#b9c6d6" stroke-width="1.2" stroke-dasharray="2 2"/>
  <!-- play-yuno (paused -> playing) -->
  <line x1="600" y1="106" x2="665" y2="106" stroke="#2a9d8f" stroke-width="1.8" marker-end="url(#arGreen)"/>
  <text x="632" y="98" text-anchor="middle" font-size="10" font-weight="600" fill="#1d6b60">play-yuno</text>
  <!-- pause-yuno (playing -> paused) -->
  <line x1="665" y1="132" x2="600" y2="132" stroke="#4a78c8" stroke-width="1.8" marker-end="url(#ar)"/>
  <text x="632" y="148" text-anchor="middle" font-size="10" font-weight="600" fill="#22386b">pause-yuno</text>

  <!-- kill-yuno: from running back to STOPPED (U route along the bottom) -->
  <path d="M525,152 L525,250 L190,250 L190,128 L180,128" fill="none" stroke="#5b6b7f" stroke-width="1.8" stroke-dasharray="1 0" marker-end="url(#ar)"/>
  <text x="356" y="242" text-anchor="middle" font-size="10.5" font-weight="600" fill="#41504f">kill-yuno · SIGQUIT &#8594; EV_ON_CLOSE (orderly)</text>

  <!-- delete-yuno: STOPPED -> DELETED (only if stopped) -->
  <line x1="105" y1="152" x2="105" y2="300" stroke="#c0492f" stroke-width="1.8" marker-end="url(#arRed)"/>
  <text x="98" y="232" text-anchor="end" font-size="10.5" font-weight="600" fill="#9a3a25">delete-yuno</text>
  <text x="98" y="246" text-anchor="end" font-size="9.5" fill="#b56a55">(only if stopped)</text>

  <!-- caption -->
  <text x="430" y="388" text-anchor="middle" font-size="11" fill="#8593a3">The agent stays in ST_IDLE; events drive the per-yuno record fields (running / playing). Lifecycle: create &#183; run &#183; play &#8644; pause &#183; kill &#183; delete.</text>
</svg>
