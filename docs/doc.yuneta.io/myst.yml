# MyST Markdown project configuration for the full Yuneta Simplified docs.
# Docs: https://mystmd.org/guide/quickstart
#
# Each API module is one landing page that contains every function
# (anchored with `(funcname)=`), so the TOC has one entry per module
# rather than one per symbol.
version: 1

project:
  id: yuneta-simplified-mystmd
  title: Yuneta Simplified
  description: |
    An asynchronous development framework focused on messaging and services.
    Documentation rebuilt with mystmd (Jupyter Book 2) from the MyST
    Markdown sources originally written for Sphinx.
  authors:
    - nameParsed:
        literal: ArtGins
        family: ArtGins
  github: https://github.com/artgins/yunetas
  license: MIT

  toc:
    - file: index.md

    - title: Get Started
      children:
        - file: installation.md
        - file: activating.md
        - file: CHANGELOG.md

    - title: Philosophy
      children:
        - title: Design Principles
          file: philosophy/design_principles.md
        - title: Domain Model
          file: philosophy/domain_model.md
        - title: Inspiration
          file: philosophy/philosophy.md

    - title: Guides
      children:
        - file: guide/basic_concepts.md
        - file: guide/guide_gclass.md
        - file: guide/guide_gobj.md
        - file: guide/guide_sdata.md
        - file: guide/guide_kwid.md
        - file: guide/guide_gbuffer.md
        - file: guide/folders.md
        - file: guide/persistent_attrs.md
        - file: guide/parser_command.md
        - file: guide/parser_stats.md
        - file: guide/settings.md
        - file: guide/guide_authz.md
        - file: guide/guide_timeranger2.md
        - file: guide/guide_yev_loop.md
        - file: guide/guide_ytls.md
        - file: guide/guide_oauth2_pkce_bff.md

    - title: Built-in GClasses
