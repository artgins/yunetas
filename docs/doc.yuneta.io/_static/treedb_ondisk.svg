<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" role="img" aria-label="timeranger2 on-disk layout. A database holds __timeranger2__.json and per-topic files (topic_desc, topic_cols, topic_var). Records live under keys/key/date.json paired with a 32-byte date.md2 index. The disks/rt_id/ tree holds hardlinks back into the keys/ files, which is how non-master and cross-yuno readers see the same data.">
  <defs>
    <marker id="td" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#d98a3d"/>
    </marker>
  </defs>
  <!-- transparent background -->

  <!-- topic meta header -->
  <rect x="40" y="30" width="800" height="62" rx="9" fill="#eef2f7" stroke="#5b6b7f" stroke-width="1.4"/>
  <text x="56" y="50" font-size="11" font-weight="700" fill="#33414f">&lt;database&gt;/ &#8203; __timeranger2__.json  <tspan fill="#8593a3" font-weight="400">(metadata + master lock)</tspan></text>
  <text x="56" y="70" font-size="10" fill="#5b6b7f">&lt;topic&gt;/ &#8203; topic_desc.json · topic_cols.json <tspan fill="#9a3a25" font-weight="600">(⚠ version trap)</tspan> · topic_var.json</text>
  <text x="56" y="85" font-size="9" fill="#8593a3">filename mask "%Y-%m-%d" — big topics rotate daily</text>

  <!-- keys/ box -->
  <g>
    <rect x="40" y="124" width="350" height="232" rx="10" fill="#e6f4ea" stroke="#2a9d8f" stroke-width="1.6"/>
    <rect x="40" y="124" width="350" height="26" rx="10" fill="#2a9d8f"/><rect x="40" y="137" width="350" height="13" fill="#2a9d8f"/>
    <text x="215" y="142" text-anchor="middle" font-size="11.5" font-weight="700" fill="#fff">keys/ — the real files (master)</text>

    <text x="60" y="174" font-size="10.5" font-weight="700" fill="#1d6b60">&lt;key_a&gt;/</text>
    <rect x="80" y="184" width="150" height="26" rx="5" fill="#fff" stroke="#9ed3c8"/><text x="92" y="201" font-size="9.5" fill="#1d6b60">2026-05-22.json</text>
    <rect x="240" y="184" width="130" height="26" rx="5" fill="#fff" stroke="#9ed3c8"/><text x="252" y="201" font-size="9.5" fill="#1d6b60">2026-05-22.md2</text>

    <text x="60" y="248" font-size="10.5" font-weight="700" fill="#1d6b60">&lt;key_b&gt;/</text>
    <rect x="80" y="258" width="150" height="26" rx="5" fill="#fff" stroke="#9ed3c8"/><text x="92" y="275" font-size="9.5" fill="#1d6b60">2026-05-22.json</text>
    <rect x="240" y="258" width="130" height="26" rx="5" fill="#fff" stroke="#9ed3c8"/><text x="252" y="275" font-size="9.5" fill="#1d6b60">2026-05-22.md2</text>

    <text x="215" y="330" text-anchor="middle" font-size="9" fill="#8aa39d">.json = appended records · .md2 = 32-byte index</text>
  </g>

  <!-- disks/ box -->
  <g>
    <rect x="510" y="124" width="350" height="232" rx="10" fill="#fff4e0" stroke="#d98a3d" stroke-width="1.6"/>
    <rect x="510" y="124" width="350" height="26" rx="10" fill="#d98a3d"/><rect x="510" y="137" width="350" height="13" fill="#d98a3d"/>
    <text x="685" y="142" text-anchor="middle" font-size="11.5" font-weight="700" fill="#fff">disks/&lt;rt_id&gt;/ — hardlink slots</text>

    <rect x="540" y="182" width="290" height="30" rx="6" fill="#fff" stroke="#e3b58a"/>
    <text x="552" y="201" font-size="10" fill="#7a4e18">&lt;key_a&gt;/  →  hardlink (same inode)</text>
    <rect x="540" y="256" width="290" height="30" rx="6" fill="#fff" stroke="#e3b58a"/>
    <text x="552" y="275" font-size="10" fill="#7a4e18">&lt;key_b&gt;/  →  hardlink (same inode)</text>

    <text x="685" y="322" text-anchor="middle" font-size="9.5" fill="#b08442">how non-master / cross-yuno readers</text>
    <text x="685" y="336" text-anchor="middle" font-size="9.5" fill="#b08442">see the same data — no copy</text>
  </g>

  <!-- hardlink arrows right -> left -->
  <path d="M540,197 C460,197 410,197 372,197" fill="none" stroke="#d98a3d" stroke-width="1.8" stroke-dasharray="5 4" marker-end="url(#td)"/>
  <path d="M540,271 C460,271 410,271 372,271" fill="none" stroke="#d98a3d" stroke-width="1.8" stroke-dasharray="5 4" marker-end="url(#td)"/>
  <text x="450" y="372" text-anchor="middle" font-size="10" fill="#8593a3">A hardlink is the same inode under a second path — the disks/ slot and the keys/ file are one and the same bytes on disk.</text>
</svg>
