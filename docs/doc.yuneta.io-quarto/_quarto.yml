project:
  type: website
  output-dir: _build

website:
  title: "Yuneta Simplified"
  site-url: https://yuneta.io
  repo-url: https://github.com/artgins/yunetas
  repo-branch: master
  repo-actions: [edit, source, issue]
  favicon: _static/yuneta-y.svg
  page-footer:
    center: |
      Made with [Quarto](https://quarto.org) — pilot migration of the Sphinx docs
  navbar:
    logo: _static/yuneta-label.svg
    background: light
    search: true
    right:
      - icon: github
        href: https://github.com/artgins/yunetas
        aria-label: GitHub
  sidebar:
    style: docked
    collapse-level: 2
    contents:
      - href: index.qmd
        text: Home
      - section: "Philosophy"
        contents:
          - philosophy/philosophy.qmd
          - philosophy/models.qmd
      - section: "API — istream"
        contents:
          - api/helpers/istream/index.qmd
          - api/helpers/istream/istream_create.qmd
          - api/helpers/istream/istream_destroy.qmd
          - api/helpers/istream/istream_length.qmd
          - api/helpers/istream/istream_clear.qmd
          - api/helpers/istream/istream_consume.qmd
          - api/helpers/istream/istream_cur_rd_pointer.qmd
          - api/helpers/istream/istream_extract_matched_data.qmd
          - api/helpers/istream/istream_get_gbuffer.qmd
          - api/helpers/istream/istream_is_completed.qmd
          - api/helpers/istream/istream_new_gbuffer.qmd
          - api/helpers/istream/istream_pop_gbuffer.qmd
          - api/helpers/istream/istream_read_until_delimiter.qmd
          - api/helpers/istream/istream_read_until_num_bytes.qmd
          - api/helpers/istream/istream_reset_rd.qmd
          - api/helpers/istream/istream_reset_wr.qmd
          - api/helpers/istream/ISTREAM_CREATE.qmd
          - api/helpers/istream/ISTREAM_DESTROY.qmd
      - section: "Notebooks (demo)"
        contents:
          - notebooks/demo_timeseries.qmd

format:
  html:
    theme:
      light: cosmo
      dark: darkly
    css: _static/custom.css
    toc: true
    toc-depth: 3
    code-copy: true
    code-overflow: wrap
    number-sections: false
    link-external-newwindow: true
    anchor-sections: true
    smooth-scroll: true

execute:
  freeze: auto
