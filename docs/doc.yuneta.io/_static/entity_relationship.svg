<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 270" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" role="img" aria-label="Entities A, B and C: A relates to B and A relates to C. Reality is classified into entities and the relationships between them.">
  <defs>
    <marker id="erA" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#6b7c8f"/>
    </marker>
  </defs>
  <!-- transparent background -->

  <!-- relationship edges -->
  <line x1="190" y1="68" x2="330" y2="68" stroke="#6b7c8f" stroke-width="2" marker-start="url(#erA)" marker-end="url(#erA)"/>
  <text x="260" y="58" text-anchor="middle" font-size="11" font-weight="600" fill="#33414f">relationship</text>
  <line x1="110" y1="104" x2="110" y2="170" stroke="#6b7c8f" stroke-width="2" marker-start="url(#erA)" marker-end="url(#erA)"/>
  <text x="120" y="142" font-size="11" font-weight="600" fill="#33414f">relationship</text>

  <!-- Entity A -->
  <g>
    <rect x="40" y="40" width="140" height="64" rx="9" fill="#eef2f7" stroke="#5b6b7f" stroke-width="1.5"/>
    <rect x="40" y="40" width="140" height="24" rx="9" fill="#3b4a5e"/><rect x="40" y="52" width="140" height="12" fill="#3b4a5e"/>
    <text x="110" y="57" text-anchor="middle" font-size="12.5" font-weight="700" fill="#fff">Entity A</text>
    <text x="110" y="88" text-anchor="middle" font-size="11" fill="#5b6b7f">node / instance</text>
  </g>
  <!-- Entity B -->
  <g>
    <rect x="330" y="40" width="140" height="64" rx="9" fill="#eef2f7" stroke="#5b6b7f" stroke-width="1.5"/>
    <rect x="330" y="40" width="140" height="24" rx="9" fill="#3b4a5e"/><rect x="330" y="52" width="140" height="12" fill="#3b4a5e"/>
    <text x="400" y="57" text-anchor="middle" font-size="12.5" font-weight="700" fill="#fff">Entity B</text>
    <text x="400" y="88" text-anchor="middle" font-size="11" fill="#5b6b7f">node / instance</text>
  </g>
  <!-- Entity C -->
  <g>
    <rect x="40" y="170" width="140" height="64" rx="9" fill="#eef2f7" stroke="#5b6b7f" stroke-width="1.5"/>
    <rect x="40" y="170" width="140" height="24" rx="9" fill="#3b4a5e"/><rect x="40" y="182" width="140" height="12" fill="#3b4a5e"/>
    <text x="110" y="187" text-anchor="middle" font-size="12.5" font-weight="700" fill="#fff">Entity C</text>
    <text x="110" y="218" text-anchor="middle" font-size="11" fill="#5b6b7f">node / instance</text>
  </g>

  <text x="400" y="200" text-anchor="middle" font-size="11" fill="#8593a3">classify reality into</text>
  <text x="400" y="218" text-anchor="middle" font-size="11" fill="#8593a3">entities + relationships</text>
</svg>
