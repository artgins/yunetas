<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 400" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" role="img" aria-label="Template decision tree. What are you starting? A gclass splits into SERVICE (gclass_service) or CHILD (gclass_child); a yuno into citizen (yuno_citizen) or standalone (yuno_standalone); a generic file or pure C project into c_h_file or c_project. A JS gclass uses js_gclass.">
  <defs>
    <marker id="sc" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#5b6b7f"/>
    </marker>
  </defs>
  <!-- transparent background -->

  <!-- root -->
  <rect x="378" y="20" width="164" height="44" rx="10" fill="#3b4a5e"/>
  <text x="460" y="47" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">what are you starting?</text>

  <!-- branch nodes -->
  <g>
    <rect x="60" y="100" width="200" height="48" rx="9" fill="#e8f0fe" stroke="#4a78c8" stroke-width="1.5"/>
    <text x="160" y="129" text-anchor="middle" font-size="12" font-weight="700" fill="#22386b">a gclass</text>
    <rect x="360" y="100" width="200" height="48" rx="9" fill="#e6f4ea" stroke="#2a9d8f" stroke-width="1.5"/>
    <text x="460" y="129" text-anchor="middle" font-size="12" font-weight="700" fill="#1d6b60">a yuno</text>
    <rect x="660" y="100" width="200" height="48" rx="9" fill="#eef2f7" stroke="#5b6b7f" stroke-width="1.5"/>
    <text x="760" y="123" text-anchor="middle" font-size="12" font-weight="700" fill="#33414f">a generic file</text>
    <text x="760" y="139" text-anchor="middle" font-size="9" fill="#8593a3">/ pure C project</text>
  </g>
  <!-- root edges -->
  <g stroke="#5b6b7f" stroke-width="1.6" fill="none">
    <path d="M460,64 L460,82 L160,82 L160,100" marker-end="url(#sc)"/>
    <path d="M460,82 L460,100" marker-end="url(#sc)"/>
    <path d="M460,82 L760,82 L760,100" marker-end="url(#sc)"/>
  </g>

  <!-- leaves -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
    <!-- gclass leaves -->
    <rect x="44" y="220" width="116" height="56" rx="8" fill="#fff" stroke="#4a78c8" stroke-width="1.4"/>
    <text x="102" y="240" text-anchor="middle" font-size="9.5" font-weight="700" font-family="sans-serif" fill="#22386b">SERVICE</text>
    <text x="102" y="261" text-anchor="middle" font-size="10" fill="#22386b">gclass_service</text>
    <rect x="170" y="220" width="116" height="56" rx="8" fill="#fff" stroke="#4a78c8" stroke-width="1.4"/>
    <text x="228" y="240" text-anchor="middle" font-size="9.5" font-weight="700" font-family="sans-serif" fill="#22386b">CHILD</text>
    <text x="228" y="261" text-anchor="middle" font-size="10" fill="#22386b">gclass_child</text>

    <!-- yuno leaves -->
    <rect x="344" y="220" width="116" height="56" rx="8" fill="#fff" stroke="#2a9d8f" stroke-width="1.4"/>
    <text x="402" y="240" text-anchor="middle" font-size="9.5" font-weight="700" font-family="sans-serif" fill="#1d6b60">citizen</text>
    <text x="402" y="261" text-anchor="middle" font-size="10" fill="#1d6b60">yuno_citizen</text>
    <rect x="470" y="220" width="116" height="56" rx="8" fill="#fff" stroke="#2a9d8f" stroke-width="1.4"/>
    <text x="528" y="240" text-anchor="middle" font-size="9.5" font-weight="700" font-family="sans-serif" fill="#1d6b60">standalone</text>
    <text x="528" y="261" text-anchor="middle" font-size="10" fill="#1d6b60">yuno_standalone</text>

    <!-- file leaves -->
    <rect x="644" y="220" width="116" height="56" rx="8" fill="#fff" stroke="#5b6b7f" stroke-width="1.4"/>
    <text x="702" y="252" text-anchor="middle" font-size="10" fill="#33414f">c_h_file</text>
    <rect x="770" y="220" width="116" height="56" rx="8" fill="#fff" stroke="#5b6b7f" stroke-width="1.4"/>
    <text x="828" y="252" text-anchor="middle" font-size="10" fill="#33414f">c_project</text>
  </g>
  <!-- branch edges -->
  <g stroke="#9aa7b6" stroke-width="1.4" fill="none">
    <path d="M160,148 L102,220" marker-end="url(#sc)"/>
    <path d="M160,148 L228,220" marker-end="url(#sc)"/>
    <path d="M460,148 L402,220" marker-end="url(#sc)"/>
    <path d="M460,148 L528,220" marker-end="url(#sc)"/>
    <path d="M760,148 L702,220" marker-end="url(#sc)"/>
    <path d="M760,148 L828,220" marker-end="url(#sc)"/>
  </g>

  <!-- JS note -->
  <rect x="60" y="320" width="226" height="40" rx="8" fill="#fff4e0" stroke="#d98a3d" stroke-width="1.3"/>
  <text x="173" y="338" text-anchor="middle" font-size="10" font-weight="700" fill="#7a4e18">a JS gclass</text>
  <text x="173" y="353" text-anchor="middle" font-size="10" font-family="ui-monospace, monospace" fill="#7a4e18">→ js_gclass</text>

  <text x="540" y="345" text-anchor="middle" font-size="10.5" fill="#8593a3">yuno_citizen is the default for almost everything — it runs under the local yuno_agent.</text>
</svg>
