<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 340" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" role="img" aria-label="Process tree: init launches the grandparent yuneta_agent; the parent exits leaving a watcher (session leader, waitpid loop); the watcher forks the yuno child; on a crash the watcher re-execs the child. ps shows two pids per yuno.">
  <defs>
    <marker id="pt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#5b6b7f"/>
    </marker>
    <marker id="ptRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#c0492f"/>
    </marker>
  </defs>
  <!-- transparent background -->

  <!-- init -->
  <g>
    <rect x="20" y="138" width="96" height="56" rx="8" fill="#eef2f7" stroke="#5b6b7f" stroke-width="1.4"/>
    <text x="68" y="162" text-anchor="middle" font-size="12" font-weight="700" fill="#33414f">init</text>
    <text x="68" y="180" text-anchor="middle" font-size="10.5" fill="#8593a3">sysv S01</text>
  </g>

  <!-- grandparent -->
  <g>
    <rect x="156" y="112" width="196" height="108" rx="9" fill="#eef2f7" stroke="#5b6b7f" stroke-width="1.5"/>
    <rect x="156" y="112" width="196" height="26" rx="9" fill="#5b6b7f"/><rect x="156" y="127" width="196" height="11" fill="#5b6b7f"/>
    <text x="254" y="130" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">grandparent</text>
    <text x="254" y="158" text-anchor="middle" font-size="11" fill="#41504f">yuneta_agent --start</text>
    <text x="254" y="178" text-anchor="middle" font-size="10.5" fill="#8593a3">fork()</text>
    <text x="254" y="196" text-anchor="middle" font-size="10.5" fill="#b56a55">parent exits ✕</text>
  </g>

  <!-- watcher -->
  <g>
    <rect x="404" y="112" width="216" height="108" rx="9" fill="#fff4e0" stroke="#d98a3d" stroke-width="1.5"/>
    <rect x="404" y="112" width="216" height="26" rx="9" fill="#d98a3d"/><rect x="404" y="127" width="216" height="11" fill="#d98a3d"/>
    <text x="512" y="130" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">watcher  (watcher_pid)</text>
    <text x="512" y="158" text-anchor="middle" font-size="10.5" fill="#7a4e18">session leader · waitpid() loop</text>
    <text x="512" y="176" text-anchor="middle" font-size="10.5" fill="#7a4e18">ignores all signals but SIGCHLD</text>
    <text x="512" y="196" text-anchor="middle" font-size="10.5" fill="#b08442">fork() ►</text>
  </g>

  <!-- yuno child -->
  <g>
    <rect x="672" y="112" width="190" height="108" rx="9" fill="#e6f4ea" stroke="#2a9d8f" stroke-width="1.5"/>
    <rect x="672" y="112" width="190" height="26" rx="9" fill="#2a9d8f"/><rect x="672" y="127" width="190" height="11" fill="#2a9d8f"/>
    <text x="767" y="130" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">yuno child  (pid)</text>
    <text x="767" y="158" text-anchor="middle" font-size="10.5" fill="#1d6b60">gobj tree · yev_loop_run</text>
    <text x="767" y="176" text-anchor="middle" font-size="10.5" fill="#1d6b60">own signalfd (c_yuno.c)</text>
    <text x="767" y="196" text-anchor="middle" font-size="10.5" fill="#3f9588">the process you work with</text>
  </g>

  <!-- arrows -->
  <line x1="116" y1="166" x2="156" y2="166" stroke="#5b6b7f" stroke-width="1.8" marker-end="url(#pt)"/>
  <text x="136" y="158" text-anchor="middle" font-size="9.5" fill="#8593a3">launch</text>
  <line x1="352" y1="166" x2="404" y2="166" stroke="#5b6b7f" stroke-width="1.8" marker-end="url(#pt)"/>
  <line x1="620" y1="166" x2="672" y2="166" stroke="#5b6b7f" stroke-width="1.8" marker-end="url(#pt)"/>

  <!-- re-exec on crash -->
  <path d="M512,220 L512,280 L767,280 L767,220" fill="none" stroke="#c0492f" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#ptRed)"/>
  <text x="640" y="274" text-anchor="middle" font-size="10.5" font-weight="600" fill="#9a3a25">child SEGVs → watcher sleeps 2s, re-execs the same binary</text>

  <!-- 2-pids bracket -->
  <path d="M404,104 L404,94 L862,94 L862,104" fill="none" stroke="#9aa7b6" stroke-width="1.3"/>
  <text x="633" y="84" text-anchor="middle" font-size="11" font-weight="600" fill="#5b6b7f">pgrep yuneta_agent on a healthy box → 2 pids (watcher + child)</text>

  <text x="441" y="316" text-anchor="middle" font-size="10.5" fill="#8593a3">The agent never drives the restart — it learns indirectly when its channel to the yuno closes.</text>
</svg>
