# Verify that every PUBLIC function declared in the kernel C headers has
# a matching `(funcname)=` anchor in the mystmd documentation landing
# pages, and vice versa. Runs on any change that could break this
# invariant: kernel headers, mystmd sources, or the verifier script.
#
# See tools/docs-migration/verify_api_coverage.py for the exact mapping
# of headers ↔ landings and the report format.

name: docs-api-coverage

on:
  push:
    branches: [main, master]
    paths:
      - 'kernel/c/**/*.h'
      - 'docs/doc.yuneta.io-mystmd/**/*.md'
      - 'tools/docs-migration/verify_api_coverage.py'
      - '.github/workflows/docs-api-coverage.yml'
  pull_request:
    paths:
      - 'kernel/c/**/*.h'
      - 'docs/doc.yuneta.io-mystmd/**/*.md'
      - 'tools/docs-migration/verify_api_coverage.py'
      - '.github/workflows/docs-api-coverage.yml'
  workflow_dispatch:  # allow manual runs from the Actions tab

permissions:
  contents: read

jobs:
  verify:
    name: Verify API coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      # The verifier uses only the stdlib (re, pathlib, dataclasses) —
      # no pip install required. Keep it that way so the job stays
      # trivially fast and offline-friendly.
      - name: Run verify_api_coverage.py
        run: |
          python3 tools/docs-migration/verify_api_coverage.py
        # Exit code is 0 when every header is [OK], non-zero if any
        # header has gaps or stale entries. The step (and therefore
        # the job) fails on non-zero, blocking merges until fixed.
