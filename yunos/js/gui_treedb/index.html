<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title></title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <!--
    HACK: connect-src origins MUST match backend_config.js exactly.
    Every WebSocket backend (backend_urls) and OAuth server (keycloak_configs → auth-server-url)
    declared there needs a corresponding entry here, and vice-versa.
  -->
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self';
          script-src 'self';
          style-src 'self' 'unsafe-inline';
          connect-src 'self'
            wss://localhost:1800
            wss://treedb.yunetas.com:1800
            https://localhost:1801
            https://treedb.yunetas.com:1801
            https://auth.artgins.com;
          worker-src 'self' blob:;
          child-src 'self' blob:;
          img-src 'self' data: blob:;
          font-src 'self' data:;">

  <link rel="manifest" href="/site.webmanifest">
  <link rel="apple-touch-icon" href="/icon.png">

<!-- METADATA_PLACEHOLDER -->
  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
    }
  </style>

</head>
<body>
  <div id="loading-message"
     style="display:flex;border: 8px solid blue; padding: 2em; font-size: 24px; background-color: #f8f1fd !important; color:red !important; align-items: center; justify-content: center;">
  Loading application. Wait please...
  </div>

  <script type="module" src="src/main.js"></script>
</body>
</html>
